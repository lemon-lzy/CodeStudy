# 公共配置文件（无任何敏感信息，可安全提交到仓库）
spring:
  application:
    name: code-study-backend
  # 默认激活 dev 环境（会自动加载 application-dev.yml 配置，本地开发生效）
  profiles:
    active: dev
  # 支持 swagger3
  mvc:
    pathmatch:
      matching-strategy: ant_path_matcher
  # rabbitmq 通用配置（本地默认配置，无敏感信息）
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest
    virtual-host: /
  # session 通用配置
  session:
    store-type: redis
    timeout: 2592000
  # 数据库公共配置（仅保留驱动，真实配置在 application-dev.yml 中）
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
  # Redis 通用配置（无敏感信息）
  redis:
    database: 2
    host: 127.0.0.1
    port: 6379
    timeout: 5000
    lettuce:
      pool:
        max-active: 100
        max-idle: 8
        min-idle: 2
        max-wait: 1000
      shutdown-timeout: 100ms
  # 文件上传通用配置
  servlet:
    multipart:
      max-file-size: 10MB
server:
  address: 0.0.0.0
  port: 8101
  servlet:
    context-path: /api
    session:
      cookie:
        max-age: 2592000
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: false
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      logic-delete-field: isDelete
      logic-delete-value: 1
      logic-not-delete-value: 0
# 微信相关（仅保留结构，真实配置在 application-dev.yml 中）
wx:
  mp:
    token: placeholder # 占位符
    aesKey: placeholder
    appId: placeholder
    secret: placeholder
    config-storage:
      http-client-type: HttpClient
      key-prefix: wx
      redis:
        host: 127.0.0.1
        port: 6379
      type: Memory
  open:
    appId: placeholder
    appSecret: placeholder
# 对象存储（仅保留结构，真实配置在 application-dev.yml 中）
cos:
  client:
    accessKey: placeholder
    secretKey: placeholder
    region: placeholder
    bucket: placeholder
# 接口文档配置（通用配置，可提交）
knife4j:
  enable: true
  openapi:
    title: "接口文档"
    version: 1.0
    group:
      default:
        api-rule: package
        api-rule-resources:
          - com.lzy.codestudybackend.controller
